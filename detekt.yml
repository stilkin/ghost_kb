build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

empty-blocks:
  EmptyFunctionBlock:
    active: false  # Required interface callbacks legitimately have empty bodies

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 20

style:
  MagicNumber:
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '100'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreEnums: true
  WildcardImport:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
